<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIVIC.OS — Regional Map</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        :root {
            --bg-main:    #06080f;
            --bg-card:    #0d1117;
            --bg-sidebar: #080b12;
            --bg-elevated:#111827;
            --text-main:  #f0f6ff;
            --text-muted: #6b7a99;
            --border:     rgba(255,255,255,0.07);
            --neon-orange: #ff5e1a;
            --neon-cyan:   #00d4ff;
            --neon-green:  #00ff88;
            --neon-purple: #c084fc;
            --neon-pink:   #ff2d78;
            --neon-gold:   #ffd93d;
            --gap-dynamic: clamp(1rem, 2vw, 1.75rem);
            --radius: 1rem;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { height: 100%; }

        body {
            height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
        }

        .app-container { display: flex; width: 100%; height: 100vh; overflow: hidden; }

        /* ── SIDEBAR (identical to dashboard) ── */
        .sidebar {
            flex: 0 0 270px;
            background: var(--bg-sidebar);
            padding: 1.5rem 1.25rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            top: 0; right: -1px; bottom: 0; width: 1px;
            background: linear-gradient(180deg, var(--neon-orange) 0%, var(--neon-pink) 50%, var(--neon-cyan) 100%);
            opacity: 0.4;
        }

        .logo {
            font-size: 1.4rem; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 0.3rem;
            background: linear-gradient(90deg, var(--neon-orange), var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; margin-top: 0.5rem; }

        .nav-item {
            padding: 0.7rem 1rem;
            color: var(--text-muted);
            border-radius: 0.6rem;
            cursor: pointer;
            font-size: 0.9rem; font-weight: 500;
            transition: all 0.15s;
            display: flex; align-items: center; gap: 0.6rem;
            text-decoration: none;
        }
        .nav-item:hover  { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .nav-item.active { background: rgba(0,212,255,0.1); color: var(--neon-cyan); }

        @keyframes badge-pulse {
            0%,100% { box-shadow: 0 0 4px #ff2d78; }
            50%      { box-shadow: 0 0 9px #ff2d78; }
        }
        .new-badge {
            display: none;
            width: 7px; height: 7px;
            background: #ff2d78;
            border-radius: 50%;
            margin-left: auto;
            flex-shrink: 0;
            animation: badge-pulse 1.8s ease-in-out infinite;
        }
        .new-badge.show { display: inline-block; }

        .sidebar-bottom {
            margin-top: auto; padding-top: 1.5rem;
            display: flex; flex-direction: column; gap: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .auth-area { display: flex; flex-direction: column; gap: 0.5rem; }

        .user-pill {
            display: flex; align-items: center; gap: 0.65rem;
            padding: 0.6rem 0.9rem;
            background: rgba(192,132,252,0.1); border: 1px solid rgba(192,132,252,0.25);
            border-radius: 0.75rem; font-size: 0.85rem;
        }
        .user-avatar {
            width: 1.8rem; height: 1.8rem; border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.75rem; flex-shrink: 0;
        }
        .user-name { font-weight: 600; color: var(--neon-purple); flex: 1; }
        .btn-logout { background: none; border: none; color: var(--text-muted); font-size: 0.75rem; cursor: pointer; transition: color 0.15s; }
        .btn-logout:hover { color: var(--neon-pink); }

        .btn-login {
            width: 100%; padding: 0.75rem;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 0.75rem; color: var(--text-muted);
            font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center;
        }
        .btn-login:hover { border-color: var(--neon-purple); color: var(--neon-purple); background: rgba(192,132,252,0.06); }

        .btn-add {
            width: 100%; padding: 0.9rem;
            background: linear-gradient(135deg, var(--neon-orange) 0%, var(--neon-pink) 100%);
            color: white; border: none; border-radius: 0.75rem;
            font-size: 1rem; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            box-shadow: 0 4px 20px rgba(255,94,26,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none;
        }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(255,94,26,0.5); }

        @keyframes pulse-live {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:0.4; transform:scale(0.75); }
        }
        .live-dot {
            display: inline-block; width: 6px; height: 6px;
            background: var(--neon-green); border-radius: 50%;
            animation: pulse-live 1.8s ease-in-out infinite;
            box-shadow: 0 0 6px var(--neon-green); flex-shrink: 0;
        }

        /* ── MAP AREA ── */
        .map-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Stats bar across the top */
        .map-stats {
            display: flex;
            gap: 0;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .map-stat {
            flex: 1;
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-right: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .map-stat:last-child { border-right: none; }
        .map-stat:hover { background: rgba(255,255,255,0.03); }
        .map-stat.filtered { background: rgba(var(--stat-rgb), 0.08); }

        .map-stat::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 2px;
            background: var(--stat-color);
            opacity: 0;
            transition: opacity 0.15s;
        }
        .map-stat.filtered::after { opacity: 1; }

        .stat-icon { font-size: 1.2rem; line-height: 1; }
        .stat-info { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 600; }
        .stat-num   { font-size: 1.2rem; font-weight: 900; color: var(--stat-color); font-variant-numeric: tabular-nums; }

        /* Leaflet map fills remaining space */
        #map {
            flex: 1;
            width: 100%;
            min-height: 0;
        }

        /* Override Leaflet popup to match theme */
        .leaflet-popup-content-wrapper {
            background: var(--bg-elevated) !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            border-radius: 0.85rem !important;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7) !important;
            color: var(--text-main) !important;
            font-family: 'Inter', system-ui, sans-serif !important;
            padding: 0 !important;
        }
        .leaflet-popup-content { margin: 0 !important; width: auto !important; }
        .leaflet-popup-tip { background: var(--bg-elevated) !important; }
        .leaflet-popup-close-button { color: var(--text-muted) !important; font-size: 1.2rem !important; top: 8px !important; right: 10px !important; }
        .leaflet-popup-close-button:hover { color: var(--text-main) !important; }

        /* Custom popup content */
        .popup-inner {
            padding: 1rem 1.25rem;
            min-width: 220px;
            max-width: 280px;
        }
        .popup-tag {
            display: inline-flex; align-items: center; gap: 0.3rem;
            font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;
            padding: 0.2rem 0.65rem; border-radius: 9999px; margin-bottom: 0.6rem;
        }
        .popup-desc { font-size: 0.85rem; color: var(--text-main); margin-bottom: 0.5rem; line-height: 1.4; }
        .popup-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 0.2rem; }
        .popup-meta span { display: flex; align-items: center; gap: 0.35rem; }

        /* Legend */
        .map-legend {
            position: absolute;
            bottom: 2rem; right: 1rem;
            z-index: 500;
            background: rgba(13,17,23,0.92);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.85rem;
            padding: 0.85rem 1.1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            backdrop-filter: blur(8px);
        }
        .legend-title { font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.1rem; }
        .legend-item  { display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; font-weight: 600; }
        .legend-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        /* "No location" notice */
        .no-loc-notice {
            position: absolute;
            top: 1rem; left: 50%; transform: translateX(-50%);
            z-index: 500;
            background: rgba(13,17,23,0.9);
            border: 1px solid rgba(255,217,61,0.25);
            border-radius: 0.6rem;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            color: var(--neon-gold);
            backdrop-filter: blur(6px);
            display: none;
        }

        /* Auth modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--bg-elevated); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.25rem; padding: 2rem; width: min(400px, 94vw); display: flex; flex-direction: column; gap: 1.1rem; box-shadow: 0 30px 80px rgba(0,0,0,0.7); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 1.15rem; font-weight: 800; }
        .btn-close { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 1rem; cursor: pointer; border-radius: 0.5rem; padding: 0.3rem 0.6rem; transition: all 0.15s; }
        .btn-close:hover { border-color: var(--neon-pink); color: var(--neon-pink); }
        .auth-tabs { display: flex; background: var(--bg-main); border-radius: 0.75rem; padding: 0.25rem; gap: 0.25rem; }
        .auth-tab { flex: 1; padding: 0.6rem; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; font-weight: 600; border-radius: 0.5rem; transition: all 0.15s; }
        .auth-tab.active { background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink)); color: white; }
        .field { display: flex; flex-direction: column; gap: 0.4rem; }
        .field label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 600; }
        .field input { background: var(--bg-main); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.6rem; color: var(--text-main); padding: 0.65rem 0.9rem; font-size: 0.9rem; outline: none; width: 100%; font-family: inherit; transition: border-color 0.15s; }
        .field input:focus { border-color: var(--neon-orange); box-shadow: 0 0 0 3px rgba(255,94,26,0.1); }
        .btn-auth { padding: 0.85rem; background: linear-gradient(135deg, var(--neon-orange) 0%, var(--neon-pink) 100%); color: white; border: none; border-radius: 0.75rem; font-size: 0.95rem; font-weight: 800; cursor: pointer; transition: transform 0.15s; box-shadow: 0 4px 20px rgba(255,94,26,0.3); font-family: inherit; }
        .btn-auth:hover { transform: translateY(-1px); }
        .btn-auth:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .form-msg { font-size: 0.825rem; text-align: center; }
        .form-msg.error { color: var(--neon-pink); }
        .form-msg.success { color: var(--neon-green); }
    </style>
</head>
<body>
<div class="app-container">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
        <div>
            <div class="logo">CIVIC.OS</div>
            <div style="display:flex;align-items:center;gap:0.4rem;margin-bottom:1.75rem;">
                <span class="live-dot"></span>
                <span style="font-size:0.62rem;font-weight:700;letter-spacing:0.14em;color:var(--neon-green);text-transform:uppercase;">System Live</span>
            </div>
            <ul class="nav-links">
                <li><a class="nav-item" href="index.html">&#9632; Dashboard</a></li>
                <li><a class="nav-item" href="analytics.html">&#9651; Analytics</a></li>
                <li><a class="nav-item" href="gallery.html">&#9728; Gallery<span class="new-badge" id="galleryBadge"></span></a></li>
                <li><a class="nav-item active" href="map.html">&#9678; Regional Map</a></li>
            </ul>
        </div>
        <div class="sidebar-bottom">
            <div class="auth-area" id="authArea">
                <button class="btn-login" id="openAuthBtn">&#128274; Login / Sign Up</button>
            </div>
            <a class="btn-add" href="index.html#report">&#43; File a Report</a>
        </div>
    </aside>

    <!-- ── MAP AREA ── -->
    <div class="map-area">

        <!-- Stats filter bar -->
        <div class="map-stats">
            <div class="map-stat" id="stat-all" style="--stat-color:#f0f6ff;--stat-rgb:240,246,255;" onclick="filterMap(null,this)">
                <span class="stat-icon">&#128205;</span>
                <div class="stat-info">
                    <span class="stat-label">All Reports</span>
                    <span class="stat-num" id="count-all">—</span>
                </div>
            </div>
            <div class="map-stat" id="stat-street" style="--stat-color:#ff5e1a;--stat-rgb:255,94,26;" onclick="filterMap('street_damage',this)">
                <span class="stat-icon">🛣️</span>
                <div class="stat-info">
                    <span class="stat-label">Street Damage</span>
                    <span class="stat-num" id="count-street">—</span>
                </div>
            </div>
            <div class="map-stat" id="stat-water" style="--stat-color:#00d4ff;--stat-rgb:0,212,255;" onclick="filterMap('water_leakage',this)">
                <span class="stat-icon">💧</span>
                <div class="stat-info">
                    <span class="stat-label">Water Leakage</span>
                    <span class="stat-num" id="count-water">—</span>
                </div>
            </div>
            <div class="map-stat" id="stat-waste" style="--stat-color:#00ff88;--stat-rgb:0,255,136;" onclick="filterMap('waste_management',this)">
                <span class="stat-icon">♻️</span>
                <div class="stat-info">
                    <span class="stat-label">Waste Management</span>
                    <span class="stat-num" id="count-waste">—</span>
                </div>
            </div>
            <div class="map-stat" id="stat-infra" style="--stat-color:#c084fc;--stat-rgb:192,132,252;" onclick="filterMap('other_infra',this)">
                <span class="stat-icon">🏗️</span>
                <div class="stat-info">
                    <span class="stat-label">Other Infra</span>
                    <span class="stat-num" id="count-infra">—</span>
                </div>
            </div>
        </div>

        <!-- Leaflet map -->
        <div id="map"></div>

        <!-- No-location notice -->
        <div class="no-loc-notice" id="noLocNotice"></div>

        <!-- Legend -->
        <div class="map-legend">
            <div class="legend-title">Category</div>
            <div class="legend-item"><div class="legend-dot" style="background:#ff5e1a;box-shadow:0 0 6px #ff5e1a;"></div>Street Damage</div>
            <div class="legend-item"><div class="legend-dot" style="background:#00d4ff;box-shadow:0 0 6px #00d4ff;"></div>Water Leakage</div>
            <div class="legend-item"><div class="legend-dot" style="background:#00ff88;box-shadow:0 0 6px #00ff88;"></div>Waste Management</div>
            <div class="legend-item"><div class="legend-dot" style="background:#c084fc;box-shadow:0 0 6px #c084fc;"></div>Other Infra</div>
        </div>
    </div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authOverlay">
    <div class="modal">
        <div class="modal-header">
            <h2 id="authTitle">Welcome to CIVIC.OS</h2>
            <button class="btn-close" id="closeAuthBtn">&#x2715;</button>
        </div>
        <div class="auth-tabs">
            <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
            <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
        </div>
        <div class="field"><label>Username</label><input type="text" id="authUsername" placeholder="e.g. civic_hero" autocomplete="username"></div>
        <div class="field"><label>Password</label><input type="password" id="authPassword" placeholder="Min 6 characters" autocomplete="current-password"></div>
        <button class="btn-auth" id="authSubmitBtn">Login</button>
        <div class="form-msg" id="authMsg"></div>
    </div>
</div>

<script>
    // ── AUTH (same localStorage pattern as dashboard) ──────────────────────
    let _token    = localStorage.getItem('civic_token')    || '';
    let _username = localStorage.getItem('civic_username') || '';
    let _authMode = 'login';

    function renderAuthArea() {
        const area = document.getElementById('authArea');
        if (_token) {
            area.innerHTML = `
                <div class="user-pill">
                    <div class="user-avatar">${_username.charAt(0).toUpperCase()}</div>
                    <span class="user-name">${_username}</span>
                    <button class="btn-logout" id="logoutBtn">&#x2715;</button>
                </div>
                <button class="btn-login" id="openAuthBtn" style="font-size:0.78rem;color:var(--text-muted);">&#128274; Switch account</button>`;
            document.getElementById('logoutBtn').addEventListener('click', () => {
                _token = ''; _username = '';
                localStorage.removeItem('civic_token');
                localStorage.removeItem('civic_username');
                renderAuthArea();
            });
        } else {
            area.innerHTML = `<button class="btn-login" id="openAuthBtn">&#128274; Login / Sign Up</button>`;
        }
        document.getElementById('openAuthBtn').addEventListener('click', () => document.getElementById('authOverlay').classList.add('open'));
    }
    renderAuthArea();

    function switchTab(mode) {
        _authMode = mode;
        document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
        document.getElementById('tabSignup').classList.toggle('active', mode === 'signup');
        document.getElementById('authSubmitBtn').textContent = mode === 'login' ? 'Login' : 'Create Account';
        document.getElementById('authTitle').textContent    = mode === 'login' ? 'Welcome Back' : 'Create Account';
        document.getElementById('authMsg').textContent = '';
    }

    document.getElementById('closeAuthBtn').addEventListener('click', () => document.getElementById('authOverlay').classList.remove('open'));
    document.getElementById('authOverlay').addEventListener('click', e => { if (e.target === document.getElementById('authOverlay')) document.getElementById('authOverlay').classList.remove('open'); });

    document.getElementById('authSubmitBtn').addEventListener('click', async () => {
        const username = document.getElementById('authUsername').value.trim();
        const password = document.getElementById('authPassword').value;
        const msgEl = document.getElementById('authMsg');
        const btn   = document.getElementById('authSubmitBtn');
        if (!username || !password) { msgEl.textContent = 'Fill in both fields.'; msgEl.className = 'form-msg error'; return; }
        btn.disabled = true; msgEl.textContent = '…'; msgEl.className = 'form-msg';
        try {
            const res  = await fetch(`/api/auth/${_authMode}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Error');
            _token = data.token; _username = data.username;
            localStorage.setItem('civic_token', _token);
            localStorage.setItem('civic_username', _username);
            renderAuthArea();
            document.getElementById('authOverlay').classList.remove('open');
        } catch(e) { msgEl.textContent = e.message; msgEl.className = 'form-msg error'; }
        finally    { btn.disabled = false; }
    });
    ['authUsername','authPassword'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('authSubmitBtn').click(); });
    });

    // ── MAP SETUP ────────────────────────────────────────────────────────────
    const map = L.map('map', { zoomControl: false }).setView([20, 0], 2);

    // Move zoom controls to top-right (away from legend)
    L.control.zoom({ position: 'topright' }).addTo(map);

    // Dark CartoDB tiles — no API key needed
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" style="color:#6b7a99">OSM</a> contributors &copy; <a href="https://carto.com/attributions" style="color:#6b7a99">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20,
    }).addTo(map);

    const COLORS = {
        street_damage:    { fill: '#ff5e1a', border: '#ff8c5a' },
        water_leakage:    { fill: '#00d4ff', border: '#66e5ff' },
        waste_management: { fill: '#00ff88', border: '#66ffb8' },
        other_infra:      { fill: '#c084fc', border: '#d8a5ff' },
    };

    const CAT_LABELS = {
        street_damage: '🛣️ Street Damage',
        water_leakage: '💧 Water Leakage',
        waste_management: '♻️ Waste Management',
        other_infra: '🏗️ Other Infra',
    };

    const CAT_TAG_STYLE = {
        street_damage:    'background:rgba(255,94,26,0.15);color:#ff5e1a;border:1px solid rgba(255,94,26,0.35);',
        water_leakage:    'background:rgba(0,212,255,0.12);color:#00d4ff;border:1px solid rgba(0,212,255,0.3);',
        waste_management: 'background:rgba(0,255,136,0.1);color:#00ff88;border:1px solid rgba(0,255,136,0.25);',
        other_infra:      'background:rgba(192,132,252,0.12);color:#c084fc;border:1px solid rgba(192,132,252,0.3);',
    };

    const STATUS_LABELS = { open: '🔴 Open', in_progress: '🟡 In Progress', resolved: '🟢 Resolved' };

    // Layer groups — one per category for filtering
    const layers = {
        street_damage:    L.layerGroup().addTo(map),
        water_leakage:    L.layerGroup().addTo(map),
        waste_management: L.layerGroup().addTo(map),
        other_infra:      L.layerGroup().addTo(map),
    };

    let allReports = [];
    let activeBounds = null;
    let currentFilter = null;

    function makeMarker(r) {
        const c = COLORS[r.category] || { fill: '#f0f6ff', border: '#fff' };
        const marker = L.circleMarker([r.latitude, r.longitude], {
            radius: 9,
            fillColor: c.fill,
            color: c.border,
            weight: 2,
            opacity: 1,
            fillOpacity: 0.75,
        });

        const when = new Date(r.created_at).toLocaleString();
        const desc = r.description ? `<div class="popup-desc">${r.description}</div>` : '';
        const addr = r.address     ? `<span>📍 ${r.address}</span>` : '';

        marker.bindPopup(`
            <div class="popup-inner">
                <div class="popup-tag" style="${CAT_TAG_STYLE[r.category]}">${CAT_LABELS[r.category] || r.category}</div>
                ${desc}
                <div class="popup-meta">
                    ${addr}
                    <span>👤 ${r.username || 'Anonymous'}</span>
                    <span>${STATUS_LABELS[r.status] || r.status}</span>
                    <span>🕐 ${when}</span>
                </div>
            </div>`, { maxWidth: 300, className: '' });

        // Glow on hover
        marker.on('mouseover', function() {
            this.setStyle({ radius: 12, fillOpacity: 1 });
        });
        marker.on('mouseout', function() {
            this.setStyle({ radius: 9, fillOpacity: 0.75 });
        });

        return marker;
    }

    function renderMarkers(reports) {
        Object.values(layers).forEach(l => l.clearLayers());
        let bounds = [];

        reports.forEach(r => {
            if (!r.latitude || !r.longitude) return;
            const m = makeMarker(r);
            layers[r.category]?.addLayer(m);
            bounds.push([r.latitude, r.longitude]);
        });

        if (bounds.length) {
            activeBounds = bounds;
            map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
        }
    }

    function filterMap(category, el) {
        currentFilter = category;

        // Update stat bar highlight
        document.querySelectorAll('.map-stat').forEach(s => s.classList.remove('filtered'));
        if (el) el.classList.add('filtered');

        // Show/hide layers
        Object.entries(layers).forEach(([cat, layer]) => {
            if (!category || cat === category) {
                map.addLayer(layer);
            } else {
                map.removeLayer(layer);
            }
        });

        // Re-fit to visible markers
        const visible = allReports.filter(r => (!category || r.category === category) && r.latitude && r.longitude);
        if (visible.length) {
            map.fitBounds(visible.map(r => [r.latitude, r.longitude]), { padding: [50, 50], maxZoom: 14 });
        } else if (activeBounds?.length) {
            map.fitBounds(activeBounds, { padding: [50, 50], maxZoom: 14 });
        }
    }

    function checkGalleryBadge(reports) {
        const lastVisit = parseInt(localStorage.getItem('gallery_last_visit') || '0', 10);
        const cutoff    = Date.now() - 24 * 60 * 60 * 1000;
        const hasNew    = reports.some(r => {
            const t = new Date(r.created_at).getTime();
            return t > cutoff && t > lastVisit;
        });
        const badge = document.getElementById('galleryBadge');
        if (badge) badge.classList.toggle('show', hasNew);
    }

    async function loadData() {
        try {
            const [reports, stats] = await Promise.all([
                fetch('/api/reports?limit=500').then(r => r.json()),
                fetch('/api/reports/stats').then(r => r.json()),
            ]);

            allReports = reports;
            checkGalleryBadge(reports);

            // Update stat bar counts
            document.getElementById('count-all').textContent    = stats.total;
            document.getElementById('count-street').textContent = stats.street_damage;
            document.getElementById('count-water').textContent  = stats.water_leakage;
            document.getElementById('count-waste').textContent  = stats.waste_management;
            document.getElementById('count-infra').textContent  = stats.other_infra;

            // No-location notice
            const noLoc = reports.filter(r => !r.latitude || !r.longitude).length;
            if (noLoc > 0 && reports.length > 0) {
                const notice = document.getElementById('noLocNotice');
                notice.textContent = `${noLoc} report${noLoc > 1 ? 's' : ''} without location data — not shown on map`;
                notice.style.display = 'block';
                setTimeout(() => { notice.style.display = 'none'; }, 5000);
            }

            renderMarkers(reports);

        } catch(e) {
            console.error('Failed to load reports:', e);
        }
    }

    loadData();

    // Ensure Leaflet fills the container after layout is complete
    setTimeout(() => map.invalidateSize(), 50);
</script>
</body>
</html>
