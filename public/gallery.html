<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIVIC.OS — Gallery</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        :root {
            --bg-main:     #06080f;
            --bg-card:     #0d1117;
            --bg-sidebar:  #080b12;
            --bg-elevated: #111827;
            --text-main:   #f0f6ff;
            --text-muted:  #6b7a99;
            --border:      rgba(255,255,255,0.07);
            --neon-orange: #ff5e1a;
            --neon-cyan:   #00d4ff;
            --neon-green:  #00ff88;
            --neon-purple: #c084fc;
            --neon-pink:   #ff2d78;
            --neon-gold:   #ffd93d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { height: 100%; }
        body {
            height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
        }

        .app-container { display: flex; width: 100%; height: 100vh; overflow: hidden; }

        /* ── SIDEBAR ── */
        .sidebar {
            flex: 0 0 270px;
            background: var(--bg-sidebar);
            padding: 1.5rem 1.25rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            position: relative;
            height: 100vh;
            overflow-y: auto;
            z-index: 10;
        }
        .sidebar::after {
            content: '';
            position: absolute;
            top: 0; right: -1px; bottom: 0; width: 1px;
            background: linear-gradient(180deg, var(--neon-orange) 0%, var(--neon-pink) 50%, var(--neon-cyan) 100%);
            opacity: 0.4;
        }
        .logo {
            font-size: 1.4rem; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 0.3rem;
            background: linear-gradient(90deg, var(--neon-orange), var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; margin-top: 0.5rem; }
        .nav-item {
            padding: 0.7rem 1rem; color: var(--text-muted); border-radius: 0.6rem; cursor: pointer;
            font-size: 0.9rem; font-weight: 500; transition: all 0.15s;
            display: flex; align-items: center; gap: 0.6rem; text-decoration: none;
        }
        .nav-item:hover  { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .nav-item.active { background: rgba(255,217,61,0.1); color: var(--neon-gold); }

        .sidebar-bottom {
            margin-top: auto; padding-top: 1.5rem;
            display: flex; flex-direction: column; gap: 0.75rem;
            border-top: 1px solid var(--border);
        }
        .auth-area { display: flex; flex-direction: column; gap: 0.5rem; }
        .user-pill {
            display: flex; align-items: center; gap: 0.65rem; padding: 0.6rem 0.9rem;
            background: rgba(192,132,252,0.1); border: 1px solid rgba(192,132,252,0.25);
            border-radius: 0.75rem; font-size: 0.85rem;
        }
        .user-avatar {
            width: 1.8rem; height: 1.8rem; border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.75rem; flex-shrink: 0;
        }
        .user-name  { font-weight: 600; color: var(--neon-purple); flex: 1; }
        .btn-logout { background: none; border: none; color: var(--text-muted); font-size: 0.75rem; cursor: pointer; transition: color 0.15s; }
        .btn-logout:hover { color: var(--neon-pink); }
        .btn-login {
            width: 100%; padding: 0.75rem;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 0.75rem; color: var(--text-muted);
            font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center;
        }
        .btn-login:hover { border-color: var(--neon-purple); color: var(--neon-purple); background: rgba(192,132,252,0.06); }
        .btn-add {
            width: 100%; padding: 0.9rem;
            background: linear-gradient(135deg, var(--neon-orange) 0%, var(--neon-pink) 100%);
            color: white; border: none; border-radius: 0.75rem;
            font-size: 1rem; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            box-shadow: 0 4px 20px rgba(255,94,26,0.35);
            transition: transform 0.15s, box-shadow 0.15s; text-decoration: none;
        }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(255,94,26,0.5); }

        @keyframes pulse-live {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:0.4; transform:scale(0.75); }
        }
        .live-dot {
            display: inline-block; width: 6px; height: 6px;
            background: var(--neon-green); border-radius: 50%;
            animation: pulse-live 1.8s ease-in-out infinite;
            box-shadow: 0 0 6px var(--neon-green); flex-shrink: 0;
        }

        /* ── GALLERY MAIN AREA ── */
        .gallery-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Category pills bar */
        .cat-bar {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.8rem 1.5rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            overflow-x: auto;
        }
        .cat-bar::-webkit-scrollbar { display: none; }

        .cat-pill {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.38rem 0.85rem;
            border-radius: 9999px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: 0.77rem; font-weight: 700;
            cursor: pointer; white-space: nowrap;
            transition: all 0.15s; font-family: inherit;
        }
        .cat-pill:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .cat-pill.active {
            border-color: var(--pc);
            color: var(--pc);
            background: rgba(var(--pr), 0.1);
        }
        .cat-count {
            background: rgba(255,255,255,0.08);
            border-radius: 9999px;
            padding: 0.08rem 0.42rem;
            font-size: 0.67rem;
        }
        .cat-divider { width: 1px; height: 1.4rem; background: var(--border); flex-shrink: 0; margin: 0 0.2rem; }

        /* Gallery body */
        .gallery-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── SLIDESHOW PANEL ── */
        .slide-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #06080f;
            min-width: 0;
        }

        .slide-stage {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* Two image slots for crossfade */
        .slide-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.55s ease;
        }

        .slide-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            background: var(--bg-card);
        }
        .ph-icon { font-size: 3.5rem; opacity: 0.25; }

        .slide-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(0deg,
                rgba(6,8,15,0.97) 0%,
                rgba(6,8,15,0.72) 52%,
                transparent 100%);
            padding: 3.5rem 2rem 1.5rem;
            pointer-events: none;
            display: none;
        }

        .slide-cat-tag {
            display: inline-flex; align-items: center; gap: 0.35rem;
            font-size: 0.67rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;
            padding: 0.22rem 0.65rem; border-radius: 9999px; margin-bottom: 0.55rem;
        }
        .slide-desc {
            font-size: 1rem; font-weight: 600; color: var(--text-main);
            margin-bottom: 0.4rem; line-height: 1.45;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .slide-meta-row {
            display: flex; flex-wrap: wrap; gap: 0.7rem;
            font-size: 0.77rem; color: var(--text-muted);
        }

        /* Progress bar */
        .slide-progress { height: 2px; background: var(--border); flex-shrink: 0; }
        .slide-progress-fill { height: 100%; width: 0%; background: var(--neon-orange); box-shadow: 0 0 5px var(--neon-orange); }

        /* Controls */
        .slide-controls {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.7rem 1.4rem;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            flex-shrink: 0; gap: 1rem;
        }
        .ctrl-group { display: flex; align-items: center; gap: 0.45rem; }
        .ctrl-btn {
            width: 2.1rem; height: 2.1rem;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 0.5rem; color: var(--text-muted);
            font-size: 0.95rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; font-family: inherit; line-height: 1;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-main); border-color: rgba(255,255,255,0.15); }
        .ctrl-btn.playing { color: var(--neon-orange); border-color: rgba(255,94,26,0.4); background: rgba(255,94,26,0.08); }
        .slide-counter { font-size: 0.84rem; font-weight: 700; color: var(--text-muted); min-width: 3.8rem; text-align: center; font-variant-numeric: tabular-nums; }

        /* Keyboard hint */
        .kbd-hint { font-size: 0.67rem; color: var(--text-muted); opacity: 0.6; display: flex; gap: 0.35rem; align-items: center; }
        .kbd { padding: 0.1rem 0.35rem; border: 1px solid var(--border); border-radius: 0.3rem; font-size: 0.62rem; }

        /* ── RIGHT PANEL ── */
        .right-panel {
            width: 310px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
            overflow: hidden;
        }

        .panel-label {
            padding: 0.55rem 1rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            font-size: 0.63rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.12em;
            color: var(--text-muted);
            display: flex; align-items: center; gap: 0.45rem;
            flex-shrink: 0;
        }
        .panel-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s; }

        #mini-map { flex: 1; min-height: 0; }

        /* Thumb strip */
        .thumb-strip {
            height: 88px;
            display: flex;
            overflow-x: auto;
            background: var(--bg-main);
            flex-shrink: 0;
            border-top: 1px solid var(--border);
        }
        .thumb-strip::-webkit-scrollbar { height: 3px; }
        .thumb-strip::-webkit-scrollbar-track { background: var(--bg-main); }
        .thumb-strip::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 9999px; }

        .thumb-item {
            width: 78px; height: 88px;
            flex-shrink: 0;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border-right: 1px solid var(--border);
            opacity: 0.42;
            transition: opacity 0.15s;
        }
        .thumb-item:hover { opacity: 0.78; }
        .thumb-item.active { opacity: 1; }
        .thumb-item.active::after {
            content: '';
            position: absolute; inset: 0;
            border: 2px solid var(--neon-orange);
            pointer-events: none;
        }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .thumb-no-img {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-elevated); font-size: 1.6rem; opacity: 0.5;
        }

        /* No-location chip on map */
        .no-loc-chip {
            position: absolute;
            top: 0.6rem; left: 50%; transform: translateX(-50%);
            z-index: 500;
            background: rgba(13,17,23,0.92);
            border: 1px solid rgba(255,217,61,0.3);
            border-radius: 0.5rem;
            padding: 0.3rem 0.75rem;
            font-size: 0.7rem; color: var(--neon-gold);
            backdrop-filter: blur(6px);
            pointer-events: none;
            display: none;
        }

        /* ── Leaflet overrides ── */
        .leaflet-popup-content-wrapper {
            background: var(--bg-elevated) !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            border-radius: 0.75rem !important;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7) !important;
            color: var(--text-main) !important;
            font-family: 'Inter', system-ui, sans-serif !important;
        }
        .leaflet-popup-tip { background: var(--bg-elevated) !important; }
        .leaflet-popup-close-button { color: var(--text-muted) !important; }
        .leaflet-control-attribution { display: none !important; }

        /* Pulsing ring for active pin */
        @keyframes ring-out {
            0%   { transform: scale(1);   opacity: 0.85; }
            100% { transform: scale(2.6); opacity: 0; }
        }
        .active-ring {
            width: 18px; height: 18px;
            border-radius: 50%;
            border: 2px solid currentColor;
            animation: ring-out 1.3s ease-out infinite;
            pointer-events: none;
        }

        /* ── AUTH MODAL ── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--bg-elevated); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.25rem; padding: 2rem; width: min(400px, 94vw); display: flex; flex-direction: column; gap: 1.1rem; box-shadow: 0 30px 80px rgba(0,0,0,0.7); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 1.15rem; font-weight: 800; }
        .btn-close { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 1rem; cursor: pointer; border-radius: 0.5rem; padding: 0.3rem 0.6rem; transition: all 0.15s; }
        .btn-close:hover { border-color: var(--neon-pink); color: var(--neon-pink); }
        .auth-tabs { display: flex; background: var(--bg-main); border-radius: 0.75rem; padding: 0.25rem; gap: 0.25rem; }
        .auth-tab { flex: 1; padding: 0.6rem; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; font-weight: 600; border-radius: 0.5rem; transition: all 0.15s; }
        .auth-tab.active { background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink)); color: white; }
        .field { display: flex; flex-direction: column; gap: 0.4rem; }
        .field label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 600; }
        .field input { background: var(--bg-main); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.6rem; color: var(--text-main); padding: 0.65rem 0.9rem; font-size: 0.9rem; outline: none; width: 100%; font-family: inherit; transition: border-color 0.15s; }
        .field input:focus { border-color: var(--neon-orange); box-shadow: 0 0 0 3px rgba(255,94,26,0.1); }
        .btn-auth { padding: 0.85rem; background: linear-gradient(135deg, var(--neon-orange) 0%, var(--neon-pink) 100%); color: white; border: none; border-radius: 0.75rem; font-size: 0.95rem; font-weight: 800; cursor: pointer; transition: transform 0.15s; box-shadow: 0 4px 20px rgba(255,94,26,0.3); font-family: inherit; }
        .btn-auth:hover { transform: translateY(-1px); }
        .btn-auth:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .form-msg { font-size: 0.825rem; text-align: center; }
        .form-msg.error   { color: var(--neon-pink); }
        .form-msg.success { color: var(--neon-green); }
    </style>
</head>
<body>
<div class="app-container">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
        <div>
            <div class="logo">CIVIC.OS</div>
            <div style="display:flex;align-items:center;gap:0.4rem;margin-bottom:1.75rem;">
                <span class="live-dot"></span>
                <span style="font-size:0.62rem;font-weight:700;letter-spacing:0.14em;color:var(--neon-green);text-transform:uppercase;">System Live</span>
            </div>
            <ul class="nav-links">
                <li><a class="nav-item" href="index.html">&#9632; Dashboard</a></li>
                <li><a class="nav-item" href="analytics.html">&#9651; Analytics</a></li>
                <li><a class="nav-item active" href="gallery.html">&#9728; Gallery</a></li>
                <li><a class="nav-item" href="map.html">&#9678; Regional Map</a></li>
            </ul>
        </div>
        <div class="sidebar-bottom">
            <div class="auth-area" id="authArea">
                <button class="btn-login" id="openAuthBtn">&#128274; Login / Sign Up</button>
            </div>
            <a class="btn-add" href="index.html">&#43; File a Report</a>
        </div>
    </aside>

    <!-- ── GALLERY AREA ── -->
    <div class="gallery-area">

        <!-- Category pills -->
        <div class="cat-bar" id="catBar"></div>

        <!-- Slideshow + right panel -->
        <div class="gallery-body">

            <!-- Slideshow -->
            <div class="slide-panel">
                <div class="slide-stage" id="slideStage">
                    <!-- Two image slots for crossfade -->
                    <img class="slide-img" id="slideA" alt="">
                    <img class="slide-img" id="slideB" alt="">
                    <!-- Meta overlay -->
                    <div class="slide-overlay" id="slideOverlay"></div>
                    <!-- Empty / loading state -->
                    <div class="slide-placeholder" id="slidePh">
                        <div class="ph-icon">📷</div>
                        <div>Loading reports…</div>
                    </div>
                </div>
                <div class="slide-progress"><div class="slide-progress-fill" id="progressFill"></div></div>
                <div class="slide-controls">
                    <div class="ctrl-group">
                        <button class="ctrl-btn" id="btnPrev" title="Previous (←)">&#8592;</button>
                        <span class="slide-counter" id="slideCounter">— / —</span>
                        <button class="ctrl-btn" id="btnNext" title="Next (→)">&#8594;</button>
                        <button class="ctrl-btn" id="btnPlay" title="Auto-play (Space)">&#9654;</button>
                    </div>
                    <div class="kbd-hint">
                        <span class="kbd">←</span><span class="kbd">→</span> navigate &nbsp; <span class="kbd">Space</span> play/pause
                    </div>
                </div>
            </div>

            <!-- Right panel: mini-map + thumbnails -->
            <div class="right-panel">
                <div class="panel-label">
                    <div class="panel-dot" id="mapDot" style="background:var(--neon-orange);box-shadow:0 0 5px var(--neon-orange);"></div>
                    Location
                </div>
                <div style="position:relative;flex:1;display:flex;flex-direction:column;min-height:0;">
                    <div id="mini-map" style="flex:1;min-height:0;"></div>
                    <div class="no-loc-chip" id="noLocChip">No location data for this report</div>
                </div>
                <div class="panel-label" style="border-top:1px solid var(--border);border-bottom:none;">
                    <div class="panel-dot" style="background:var(--neon-cyan);box-shadow:0 0 5px var(--neon-cyan);"></div>
                    <span id="thumbLabel">Slides</span>
                </div>
                <div class="thumb-strip" id="thumbStrip"></div>
            </div>
        </div>
    </div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authOverlay">
    <div class="modal">
        <div class="modal-header">
            <h2 id="authTitle">Welcome to CIVIC.OS</h2>
            <button class="btn-close" id="closeAuthBtn">&#x2715;</button>
        </div>
        <div class="auth-tabs">
            <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
            <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
        </div>
        <div class="field"><label>Username</label><input type="text" id="authUsername" placeholder="e.g. civic_hero" autocomplete="username"></div>
        <div class="field"><label>Password</label><input type="password" id="authPassword" placeholder="Min 6 characters" autocomplete="current-password"></div>
        <button class="btn-auth" id="authSubmitBtn">Login</button>
        <div class="form-msg" id="authMsg"></div>
    </div>
</div>

<script>
// ── AUTH ──────────────────────────────────────────────────────────────────────
let _token    = localStorage.getItem('civic_token')    || '';
let _username = localStorage.getItem('civic_username') || '';
let _authMode = 'login';

function renderAuthArea() {
    const area = document.getElementById('authArea');
    if (_token) {
        area.innerHTML = `
            <div class="user-pill">
                <div class="user-avatar">${_username.charAt(0).toUpperCase()}</div>
                <span class="user-name">${_username}</span>
                <button class="btn-logout" id="logoutBtn">&#x2715;</button>
            </div>
            <button class="btn-login" id="openAuthBtn" style="font-size:0.78rem;color:var(--text-muted);">&#128274; Switch account</button>`;
        document.getElementById('logoutBtn').addEventListener('click', () => {
            _token = ''; _username = '';
            localStorage.removeItem('civic_token');
            localStorage.removeItem('civic_username');
            renderAuthArea();
        });
    } else {
        area.innerHTML = `<button class="btn-login" id="openAuthBtn">&#128274; Login / Sign Up</button>`;
    }
    document.getElementById('openAuthBtn').addEventListener('click',
        () => document.getElementById('authOverlay').classList.add('open'));
}
renderAuthArea();

function switchTab(mode) {
    _authMode = mode;
    document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
    document.getElementById('tabSignup').classList.toggle('active', mode === 'signup');
    document.getElementById('authSubmitBtn').textContent = mode === 'login' ? 'Login' : 'Create Account';
    document.getElementById('authTitle').textContent    = mode === 'login' ? 'Welcome Back' : 'Create Account';
    document.getElementById('authMsg').textContent = '';
}
document.getElementById('closeAuthBtn').addEventListener('click',
    () => document.getElementById('authOverlay').classList.remove('open'));
document.getElementById('authOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('authOverlay'))
        document.getElementById('authOverlay').classList.remove('open');
});
document.getElementById('authSubmitBtn').addEventListener('click', async () => {
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value;
    const msgEl = document.getElementById('authMsg');
    const btn   = document.getElementById('authSubmitBtn');
    if (!username || !password) { msgEl.textContent = 'Fill in both fields.'; msgEl.className = 'form-msg error'; return; }
    btn.disabled = true; msgEl.textContent = '…'; msgEl.className = 'form-msg';
    try {
        const res  = await fetch(`/api/auth/${_authMode}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Error');
        _token = data.token; _username = data.username;
        localStorage.setItem('civic_token', _token);
        localStorage.setItem('civic_username', _username);
        renderAuthArea();
        document.getElementById('authOverlay').classList.remove('open');
    } catch(e) { msgEl.textContent = e.message; msgEl.className = 'form-msg error'; }
    finally    { btn.disabled = false; }
});
['authUsername','authPassword'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('authSubmitBtn').click();
    })
);

// ── CATEGORY CONFIG ───────────────────────────────────────────────────────────
const CATS = [
    { key: null,               label: 'All Reports',      icon: '📋', color: '#f0f6ff', rgb: '240,246,255' },
    { key: 'street_damage',    label: 'Street Damage',    icon: '🛣️', color: '#ff5e1a', rgb: '255,94,26'   },
    { key: 'water_leakage',    label: 'Water Leakage',    icon: '💧', color: '#00d4ff', rgb: '0,212,255'   },
    { key: 'waste_management', label: 'Waste Management', icon: '♻️', color: '#00ff88', rgb: '0,255,136'   },
    { key: 'other_infra',      label: 'Other Infra',      icon: '🏗️', color: '#c084fc', rgb: '192,132,252' },
];
const CAT_BY_KEY = Object.fromEntries(CATS.filter(c => c.key).map(c => [c.key, c]));

const MARKER_COLORS = {
    street_damage:    '#ff5e1a',
    water_leakage:    '#00d4ff',
    waste_management: '#00ff88',
    other_infra:      '#c084fc',
};

// ── MAP SETUP ─────────────────────────────────────────────────────────────────
const miniMap = L.map('mini-map', {
    zoomControl:       false,
    scrollWheelZoom:   false,
    doubleClickZoom:   false,
    dragging:          true,
    attributionControl:false,
}).setView([20, 0], 2);

L.control.zoom({ position: 'bottomright' }).addTo(miniMap);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19,
}).addTo(miniMap);

const markerGroup = L.layerGroup().addTo(miniMap);
let markerRefs = {};      // report _id → L.circleMarker
let ringMarker = null;    // L.marker with pulsing DivIcon for active pin

// ── STATE ─────────────────────────────────────────────────────────────────────
let allReports    = [];
let slides        = [];   // image-having reports filtered by category
let allStats      = {};
let currentCat    = null;
let currentIdx    = 0;
let isPlaying     = false;
let autoTimer     = null;
let progressTimer = null;
let progressStart = 0;
let activeSlot    = 'A';  // 'A' or 'B' — crossfade swap
const AUTO_MS     = 5000;

// ── CATEGORY PILLS ────────────────────────────────────────────────────────────
function buildCatBar() {
    const bar = document.getElementById('catBar');
    bar.innerHTML = '';
    CATS.forEach((cat, i) => {
        const count = cat.key ? (allStats[cat.key] || 0) : (allStats.total || 0);
        const btn = document.createElement('button');
        btn.className = 'cat-pill' + (cat.key === currentCat ? ' active' : '');
        btn.style.cssText = `--pc:${cat.color};--pr:${cat.rgb};`;
        btn.dataset.key = cat.key || '';
        btn.innerHTML = `${cat.icon} ${cat.label} <span class="cat-count">${count}</span>`;
        btn.addEventListener('click', () => selectCat(cat.key));
        bar.appendChild(btn);
        if (i === 0) {
            const sep = document.createElement('div');
            sep.className = 'cat-divider';
            bar.appendChild(sep);
        }
    });
}

// ── SELECT CATEGORY ───────────────────────────────────────────────────────────
function selectCat(catKey) {
    currentCat = catKey;
    currentIdx = 0;

    document.querySelectorAll('.cat-pill').forEach(p =>
        p.classList.toggle('active', p.dataset.key === (catKey || ''))
    );

    // Filter: only reports that have an image
    slides = allReports.filter(r => r.image_url && (!catKey || r.category === catKey));

    // Update thumb label
    const cat = catKey ? CAT_BY_KEY[catKey] : null;
    document.getElementById('thumbLabel').textContent =
        `${cat ? cat.icon + ' ' + cat.label : 'All'} — ${slides.length} slide${slides.length !== 1 ? 's' : ''}`;

    // Rebuild map markers for this category (show all reports with location, not just with images)
    rebuildMarkers();
    buildThumbStrip();
    stopAuto();
    showSlide(0);
    startAuto();
}

// ── SHOW SLIDE ────────────────────────────────────────────────────────────────
function showSlide(idx) {
    if (slides.length === 0) { showEmpty(); return; }
    if (idx < 0) idx = slides.length - 1;
    if (idx >= slides.length) idx = 0;
    currentIdx = idx;

    const r = slides[idx];
    const ph = document.getElementById('slidePh');
    ph.style.display = 'none';

    // Crossfade
    const nextSlot = activeSlot === 'A' ? 'B' : 'A';
    const nextEl   = document.getElementById('slide' + nextSlot);
    const currEl   = document.getElementById('slide' + activeSlot);

    nextEl.style.transition = 'none';
    nextEl.style.opacity    = '0';
    nextEl.alt = r.description || r.category;

    function afterLoad() {
        nextEl.style.transition = 'opacity 0.55s ease';
        nextEl.style.opacity    = '1';
        setTimeout(() => { currEl.style.opacity = '0'; }, 40);
        activeSlot = nextSlot;
    }

    if (nextEl.src !== r.image_url) {
        nextEl.onload  = afterLoad;
        nextEl.onerror = afterLoad;
        nextEl.src = r.image_url;
    } else {
        afterLoad();
    }

    // Preload next
    if (slides.length > 1) {
        const pre = new Image();
        pre.src = slides[(idx + 1) % slides.length].image_url;
    }

    // Meta overlay
    const cat = CAT_BY_KEY[r.category] || { label: r.category, color: '#f0f6ff', rgb: '240,246,255', icon: '📋' };
    const when = r.created_at
        ? new Date(r.created_at).toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' })
        : '';
    const overlay = document.getElementById('slideOverlay');
    overlay.style.display = 'block';
    overlay.innerHTML = `
        <div class="slide-cat-tag" style="background:rgba(${cat.rgb},0.15);color:${cat.color};border:1px solid rgba(${cat.rgb},0.3);">${cat.icon} ${cat.label}</div>
        ${r.description ? `<div class="slide-desc">${r.description}</div>` : ''}
        <div class="slide-meta-row">
            ${r.address  ? `<span>📍 ${r.address}</span>` : ''}
            ${r.username ? `<span>👤 ${r.username}</span>` : ''}
            ${when       ? `<span>🕐 ${when}</span>` : ''}
        </div>`;

    // Counter
    document.getElementById('slideCounter').textContent = `${idx + 1} / ${slides.length}`;

    // Thumbnails
    document.querySelectorAll('.thumb-item').forEach((el, i) =>
        el.classList.toggle('active', i === idx)
    );
    const activeThumb = document.querySelector('.thumb-item.active');
    if (activeThumb) activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

    // Map
    highlightPin(r);
    resetProgress();
}

function showEmpty() {
    stopAuto();
    document.getElementById('slideA').style.opacity = '0';
    document.getElementById('slideB').style.opacity = '0';
    document.getElementById('slideOverlay').style.display = 'none';
    const ph = document.getElementById('slidePh');
    ph.style.display = 'flex';
    const cat = currentCat ? CAT_BY_KEY[currentCat] : null;
    ph.innerHTML = `
        <div class="ph-icon">📷</div>
        <div>No photos in ${cat ? cat.label : 'any category'} yet</div>
        <div style="font-size:0.78rem;opacity:0.55;margin-top:0.2rem;">Submit a report with an image to see it here</div>`;
    document.getElementById('slideCounter').textContent = '0 / 0';
    document.getElementById('progressFill').style.width = '0%';
    removeRing();
}

// ── PROGRESS BAR ──────────────────────────────────────────────────────────────
function resetProgress() {
    const fill = document.getElementById('progressFill');
    fill.style.transition = 'none';
    fill.style.width = '0%';
    progressStart = Date.now();
}

function tickProgress() {
    const elapsed = Date.now() - progressStart;
    document.getElementById('progressFill').style.width =
        Math.min((elapsed / AUTO_MS) * 100, 100) + '%';
}

// ── AUTO-PLAY ─────────────────────────────────────────────────────────────────
function startAuto() {
    stopAuto();
    if (slides.length <= 1) return;
    isPlaying     = true;
    progressStart = Date.now();
    autoTimer     = setInterval(() => showSlide(currentIdx + 1), AUTO_MS);
    progressTimer = setInterval(tickProgress, 80);
    const btn = document.getElementById('btnPlay');
    btn.innerHTML = '&#9646;&#9646;';
    btn.classList.add('playing');
}

function stopAuto() {
    clearInterval(autoTimer);
    clearInterval(progressTimer);
    autoTimer = progressTimer = null;
    isPlaying = false;
    const btn = document.getElementById('btnPlay');
    btn.innerHTML = '&#9654;';
    btn.classList.remove('playing');
}

document.getElementById('btnPrev').addEventListener('click', () => { stopAuto(); showSlide(currentIdx - 1); });
document.getElementById('btnNext').addEventListener('click', () => { stopAuto(); showSlide(currentIdx + 1); });
document.getElementById('btnPlay').addEventListener('click', () => {
    isPlaying ? stopAuto() : startAuto();
});

// ── THUMBNAILS ────────────────────────────────────────────────────────────────
function buildThumbStrip() {
    const strip = document.getElementById('thumbStrip');
    strip.innerHTML = '';
    slides.forEach((r, i) => {
        const item = document.createElement('div');
        item.className = 'thumb-item' + (i === currentIdx ? ' active' : '');
        item.title = r.description || r.category;
        item.addEventListener('click', () => { stopAuto(); showSlide(i); });

        const img = document.createElement('img');
        img.className = 'thumb-img';
        img.src = r.image_url;
        img.loading = 'lazy';
        item.appendChild(img);
        strip.appendChild(item);
    });
}

// ── MAP MARKERS ───────────────────────────────────────────────────────────────
function rebuildMarkers() {
    markerGroup.clearLayers();
    markerRefs = {};
    removeRing();

    // Show all reports (with location) in the selected category on the minimap
    const pool = allReports.filter(r =>
        r.latitude && r.longitude && (!currentCat || r.category === currentCat)
    );
    const bounds = [];

    pool.forEach(r => {
        const col = MARKER_COLORS[r.category] || '#f0f6ff';
        const circle = L.circleMarker([r.latitude, r.longitude], {
            radius: 6, fillColor: col, color: col,
            weight: 1.5, opacity: 0.38, fillOpacity: 0.22,
        });
        circle.bindTooltip(
            `<span style="font-size:0.72rem;font-weight:600;">${r.address || r.category}</span>`,
            { direction: 'top', offset: [0, -8], className: '' }
        );
        circle.addTo(markerGroup);
        markerRefs[r._id] = circle;
        bounds.push([r.latitude, r.longitude]);
    });

    if (bounds.length) {
        miniMap.fitBounds(bounds, { padding: [28, 28], maxZoom: 12 });
    }
    setTimeout(() => miniMap.invalidateSize(), 60);
}

function removeRing() {
    if (ringMarker) { miniMap.removeLayer(ringMarker); ringMarker = null; }
}

function highlightPin(r) {
    // Dim all
    Object.values(markerRefs).forEach(m =>
        m.setStyle({ opacity: 0.38, fillOpacity: 0.22, radius: 6 })
    );
    removeRing();

    const chip = document.getElementById('noLocChip');

    if (!r.latitude || !r.longitude) {
        chip.style.display = 'block';
        setTimeout(() => { chip.style.display = 'none'; }, 3000);
        return;
    }
    chip.style.display = 'none';

    const col = MARKER_COLORS[r.category] || '#ff5e1a';
    document.getElementById('mapDot').style.background  = col;
    document.getElementById('mapDot').style.boxShadow   = `0 0 6px ${col}`;

    // Brighten active
    if (markerRefs[r._id]) {
        markerRefs[r._id].setStyle({ radius: 10, opacity: 1, fillOpacity: 0.88 });
        markerRefs[r._id].bringToFront();
    }

    // Pulsing ring via DivIcon
    const ringIcon = L.divIcon({
        className: '',
        html: `<div class="active-ring" style="color:${col};"></div>`,
        iconSize:   [18, 18],
        iconAnchor: [9, 9],
    });
    ringMarker = L.marker([r.latitude, r.longitude], { icon: ringIcon, interactive: false })
        .addTo(miniMap);

    // Gentle pan to active pin
    miniMap.panTo([r.latitude, r.longitude], { animate: true, duration: 0.45 });
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData() {
    try {
        const [reports, stats] = await Promise.all([
            fetch('/api/reports?limit=500').then(r => r.json()),
            fetch('/api/reports/stats').then(r => r.json()),
        ]);
        allReports = reports;
        allStats   = stats;
        // Mark gallery as visited so badge clears on other pages
        localStorage.setItem('gallery_last_visit', Date.now().toString());
        buildCatBar();
        selectCat(null);  // start on All
    } catch(e) {
        console.error('Gallery error:', e);
        const ph = document.getElementById('slidePh');
        ph.innerHTML = `<div class="ph-icon">⚠️</div><div>Could not load reports</div>`;
    }
}

loadData();

// Keyboard navigation
document.addEventListener('keydown', e => {
    if (document.getElementById('authOverlay').classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  { stopAuto(); showSlide(currentIdx - 1); }
    if (e.key === 'ArrowRight') { stopAuto(); showSlide(currentIdx + 1); }
    if (e.key === ' ')          { e.preventDefault(); document.getElementById('btnPlay').click(); }
});
</script>
</body>
